<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏛️ 决策档案馆 · 仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg: #0f1117; --card: #1a1d2e; --accent: #6c5ce7;
  --green: #00cec9; --orange: #fdcb6e; --red: #e17055;
  --text: #dfe6e9; --dim: #636e72;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text); padding: 24px;
  max-width: 1400px; margin: 0 auto;
}
h1 { font-size: 1.6rem; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
h1 small { font-size: 0.85rem; color: var(--dim); font-weight: 400; }
.subtitle { color: var(--dim); margin-bottom: 24px; font-size: 0.9rem; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 14px; margin-bottom: 24px; }
.card {
  background: var(--card); border-radius: 12px; padding: 18px 20px;
  border: 1px solid rgba(255,255,255,0.06);
}
.card .num { font-size: 2rem; font-weight: 700; }
.card .label { font-size: 0.8rem; color: var(--dim); margin-top: 2px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 24px; }
.chart-wrap {
  background: var(--card); border-radius: 12px; padding: 18px 20px;
  border: 1px solid rgba(255,255,255,0.06);
}
.chart-wrap h3 { font-size: 0.9rem; margin-bottom: 12px; color: var(--dim); }
.chart-wrap canvas { max-height: 280px; }
table {
  width: 100%; border-collapse: collapse; font-size: 0.85rem;
}
th { text-align: left; color: var(--dim); font-weight: 500; padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.06); }
td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.rating-badge {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  font-weight: 600; font-size: 0.8rem;
}
.high { background: rgba(0,206,201,0.15); color: var(--green); }
.mid  { background: rgba(253,203,110,0.15); color: var(--orange); }
.low  { background: rgba(225,112,85,0.15); color: var(--red); }
.tag { display: inline-block; padding: 1px 6px; border-radius: 4px; background: rgba(108,92,231,0.15); color: #a29bfe; font-size: 0.75rem; margin: 1px; }
.empty { color: var(--dim); font-style: italic; padding: 40px 0; text-align: center; }
.insight-box {
  background: rgba(108,92,231,0.08); border-left: 3px solid var(--accent);
  padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 14px;
  font-size: 0.9rem; line-height: 1.5;
}
.insight-box strong { color: #a29bfe; }
footer { text-align: center; color: var(--dim); font-size: 0.8rem; margin-top: 32px; padding: 16px 0; border-top: 1px solid rgba(255,255,255,0.04); }
@media (max-width: 800px) { .row2, .row3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>🏛️ 决策档案馆 <small>· 仪表盘</small></h1>
<div class="subtitle" id="subtitle"></div>

<div class="cards" id="summaryCards"></div>

<div class="insight-box" id="insightBox"></div>

<div class="row2">
  <div class="chart-wrap"><h3>📊 各类别决策数量</h3><canvas id="chartCategory"></canvas></div>
  <div class="chart-wrap"><h3>⚠️ 风险等级分布</h3><canvas id="chartRisk"></canvas></div>
</div>

<div class="row3">
  <div class="chart-wrap"><h3>⭐ 评分分布</h3><canvas id="chartRating"></canvas></div>
  <div class="chart-wrap"><h3>📈 月度趋势</h3><canvas id="chartTrend"></canvas></div>
  <div class="chart-wrap"><h3>🎯 各类别平均分</h3><canvas id="chartAvgRating"></canvas></div>
</div>

<div class="row2">
  <div class="chart-wrap" style="grid-column:1/-1;">
    <h3>🏆 决策排行榜</h3>
    <table><thead><tr><th>#</th><th>决策</th><th>类别</th><th>评分</th><th>创建</th><th>决策</th></tr></thead><tbody id="rankingBody"></tbody></table>
  </div>
</div>

<footer>决策档案馆 · 数据来自 data/decisions.json</footer>

<script>
function loadJSON(path, cb) {
  fetch(path).then(r => r.json()).then(cb).catch(() => {
    document.body.innerHTML = `<div class="empty">❌ 无法读取数据文件：${path}<br>请确保 data/decisions.json 存在。</div>`;
  });
}

const DATA_PATH = './data/decisions.json';

loadJSON(DATA_PATH, function(data) {
  const ds = data.decisions || [];
  if (ds.length === 0) {
    document.getElementById('subtitle').textContent = '还没有记录任何决策，快用 add 开始吧 📝';
    return;
  }

  const reviewed = ds.filter(d => d.status === 'reviewed');
  const pending = ds.filter(d => d.status === 'pending');
  const avgRating = reviewed.length ? (reviewed.reduce((s,d) => s + (d.review?.rating||0), 0) / reviewed.length) : 0;
  const totalWeighted = ds.reduce((s,d) => s + ((d.review?.rating||0) * (d.riskLevel==='高'?1.5: d.riskLevel==='中'?1.0:0.5)), 0);
  const totalFactors = ds.reduce((s,d) => s + (d.review?.rating ? (d.riskLevel==='高'?1.5: d.riskLevel==='中'?1.0:0.5) : 0), 0);
  const perfScore = totalFactors > 0 ? (totalWeighted/totalFactors).toFixed(1) : '—';

  const now = new Date();

  // Summary cards
  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="num">${ds.length}</div><div class="label">📋 总决策数</div></div>
    <div class="card"><div class="num">${reviewed.length}</div><div class="label">✅ 已复盘</div></div>
    <div class="card"><div class="num">${pending.length}</div><div class="label">⏳ 待复盘</div></div>
    <div class="card"><div class="num">${avgRating ? avgRating.toFixed(1) : '—'}</div><div class="label">⭐ 平均评分</div></div>
    <div class="card"><div class="num">${perfScore}</div><div class="label">📊 综合绩效</div></div>
    <div class="card"><div class="num">${ds.filter(d => Math.abs((new Date(d.review_date||d.created_at) - now)/(86400000)) <= 30).length}</div><div class="label">📅 30天内待复盘</div></div>
  `;
  document.getElementById('subtitle').textContent = `共 ${ds.length} 条决策 · 最后更新: ${new Date().toLocaleDateString('zh-CN')}`;

  // Insight box
  const bests = [...reviewed].sort((a,b) => (b.review?.rating||0) - (a.review?.rating||0));
  const worsts = [...reviewed].sort((a,b) => (a.review?.rating||0) - (b.review?.rating||0));
  const best = bests[0];
  const worst = worsts[0];
  let insightHTML = '';
  if (best) insightHTML += `✅ <strong>最佳决策：</strong>${best.title}（${best.review.rating}/10）`;
  if (worst && worst !== best) insightHTML += ` &nbsp;·&nbsp; ❌ <strong>最差决策：</strong>${worst.title}（${worst.review.rating}/10）`;
  if (reviewed.length >= 2) {
    const catRatings = {};
    reviewed.forEach(d => {
      const c = d.category || '未分类';
      if (!catRatings[c]) catRatings[c] = {sum:0, count:0};
      catRatings[c].sum += (d.review?.rating||0);
      catRatings[c].count++;
    });
    const cats = Object.entries(catRatings).map(([k,v]) => [k, v.sum/v.count]).sort((a,b) => a[1]-b[1]);
    const worstCat = cats[0];
    if (worstCat && insightHTML) insightHTML += ` &nbsp;·&nbsp; 🎯 <strong>最弱类别：</strong>${worstCat[0]}（${worstCat[1].toFixed(1)}分）`;
  }
  if (insightHTML) document.getElementById('insightBox').innerHTML = insightHTML;

  // Category chart
  const catCounts = {};
  ds.forEach(d => { const c = d.category||'未分类'; catCounts[c] = (catCounts[c]||0) + 1; });
  new Chart(document.getElementById('chartCategory'), {
    type: 'pie',
    data: {
      labels: Object.keys(catCounts),
      datasets: [{ data: Object.values(catCounts), backgroundColor: ['#6c5ce7','#00cec9','#fdcb6e','#e17055','#74b9ff','#fd79a8','#55efc4','#ffeaa7','#dfe6e9','#a29bfe'] }]
    },
    options: { responsive: true, plugins: { legend: { position:'bottom', labels:{color:'#dfe6e9'} } } }
  });

  // Risk chart
  const riskCounts = {高:0, 中:0, 低:0};
  ds.forEach(d => { const r = d.risk_level||'中'; riskCounts[r] = (riskCounts[r]||0) + 1; });
  new Chart(document.getElementById('chartRisk'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(riskCounts),
      datasets: [{ data: Object.values(riskCounts), backgroundColor: ['#e17055','#fdcb6e','#00cec9'] }]
    },
    options: { responsive: true, plugins: { legend: { position:'bottom', labels:{color:'#dfe6e9'} } } }
  });

  // Rating distribution
  if (reviewed.length) {
    const dist = [0,0,0,0,0];
    reviewed.forEach(d => {
      const r = d.review?.rating||0;
      if (r <= 2) dist[0]++;
      else if (r <= 4) dist[1]++;
      else if (r <= 6) dist[2]++;
      else if (r <= 8) dist[3]++;
      else dist[4]++;
    });
    new Chart(document.getElementById('chartRating'), {
      type: 'bar',
      data: {
        labels: ['0-2','3-4','5-6','7-8','9-10'],
        datasets: [{ label:'数量', data: dist, backgroundColor: ['#e17055','#fdcb6e','#74b9ff','#00cec9','#6c5ce7'] }]
      },
      options: { responsive: true, scales: { y:{ beginAtZero:true, ticks:{color:'#636e72'} }, x:{ ticks:{color:'#dfe6e9'} } }, plugins:{ legend:{display:false} } }
    });
  }

  // Monthly trend
  const monthly = {};
  ds.forEach(d => {
    const dt = new Date(d.created_at || d.date_made);
    const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
    if (!monthly[key]) monthly[key] = {total:0, count:0};
    monthly[key].count++;
    if (d.review?.rating) { monthly[key].total += d.review.rating; }
  });
  const months = Object.keys(monthly).sort();
  new Chart(document.getElementById('chartTrend'), {
    type: 'line',
    data: {
      labels: months,
      datasets: [
        { label:'新增决策', data: months.map(m => monthly[m].count), borderColor:'#6c5ce7', backgroundColor:'rgba(108,92,231,0.1)', fill:true, tension:0.3, yAxisID:'y' },
        { label:'平均评分', data: months.map(m => monthly[m].count > 0 && monthly[m].total > 0 ? (monthly[m].total/monthly[m].count).toFixed(1) : null), borderColor:'#00cec9', borderDash:[5,5], tension:0.3, yAxisID:'y1' }
      ]
    },
    options: {
      responsive: true,
      scales: { y:{ beginAtZero:true, ticks:{color:'#636e72'}, position:'left' }, y1:{ beginAtZero:true, max:10, ticks:{color:'#636e72'}, position:'right', grid:{display:false} }, x:{ ticks:{color:'#636e72'} } },
      plugins: { legend: { labels:{color:'#dfe6e9', boxWidth:12} } }
    }
  });

  // Avg rating by category
  if (reviewed.length) {
    const catRatings2 = {};
    reviewed.forEach(d => {
      const c = d.category||'未分类';
      if (!catRatings2[c]) catRatings2[c] = {sum:0, count:0};
      catRatings2[c].sum += (d.review?.rating||0);
      catRatings2[c].count++;
    });
    const cats2 = Object.keys(catRatings2);
    new Chart(document.getElementById('chartAvgRating'), {
      type: 'radar',
      data: {
        labels: cats2,
        datasets: [{ label:'平均评分', data: cats2.map(c => (catRatings2[c].sum/catRatings2[c].count).toFixed(1)), backgroundColor:'rgba(108,92,231,0.15)', borderColor:'#6c5ce7', pointBackgroundColor:'#a29bfe' }]
      },
      options: {
        responsive: true,
        scales: { r: { min:0, max:10, ticks:{color:'#636e72', stepSize:2}, pointLabels:{color:'#dfe6e9'} } },
        plugins: { legend: { display:false } }
      }
    });
  }

  // Ranking table
  const sorted = [...reviewed].sort((a,b) => (b.review?.rating||0) - (a.review?.rating||0));
  document.getElementById('rankingBody').innerHTML = sorted.length
    ? sorted.map((d,i) => `<tr>
      <td>${i+1}</td>
      <td><strong>${d.title}</strong></td>
      <td><span class="tag">${d.category||'未分类'}</span></td>
      <td><span class="rating-badge ${(d.review?.rating||0) >= 7 ? 'high' : (d.review?.rating||0) >= 4 ? 'mid' : 'low'}">${d.review?.rating||'?'}/10</span></td>
      <td>${(d.created_at||d.date_made||'').slice(0,10)}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.decision_made||''}</td>
    </tr>`).join('')
    : '<tr><td colspan="6" class="empty">暂无已复盘决策</td></tr>';
});

</script>
</body>
</html>
